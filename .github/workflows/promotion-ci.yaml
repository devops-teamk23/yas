name: promotion service ci

on:
  push:
    branches: ["**"]
    paths:
      - "promotion/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/gitleak/action.yaml"
      - ".github/workflows/promotion-ci.yaml"
  pull_request:
    branches: ["**"]
    paths:
      - "promotion/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/gitleak/action.yaml"
      - ".github/workflows/promotion-ci.yaml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      RUN_SECURITY_SCANS: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/unit-test/promotion' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - uses: ./.github/workflows/actions
      - name: Build and Install Dependencies
        run: |
          UPDATE_FLAG=""
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            UPDATE_FLAG="-U"
          fi
          mvn clean install -DskipTests -pl promotion -am $UPDATE_FLAG
      - name: Run Gitleaks Scan
        id: gitleaks_scan
        if: ${{ env.RUN_SECURITY_SCANS == 'true' }}
        run: |
          docker pull zricethezav/gitleaks:v8.18.4
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w /work \
            zricethezav/gitleaks:v8.18.4 detect \
            --source="promotion" \
            --config="/work/gitleaks.toml" \
            --verbose \
            --no-git \
            --report-format=json \
            --report-path=promotion-gitleaks-report.json
      - name: Upload Gitleaks Result
        if: ${{ always() && env.RUN_SECURITY_SCANS == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: Promotion Gitleaks Report
          path: promotion-gitleaks-report.json
          if-no-files-found: warn
      - name: Run Maven Checkstyle
        if: ${{ env.RUN_SECURITY_SCANS == 'true' }}
        run: mvn checkstyle:checkstyle -pl promotion -am -Dcheckstyle.output.file=promotion/target/promotion-checkstyle-result.xml
      - name: Upload Checkstyle Result
        if: ${{ env.RUN_SECURITY_SCANS == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: "promotion/target/promotion-checkstyle-result.xml"
      - name: Check Snyk Token Availability
        id: snyk_token_check
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SNYK_TOKEN is missing for this workflow context, skipping Snyk scan."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup Snyk CLI
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && steps.snyk_token_check.outputs.enabled == 'true' }}
        uses: snyk/actions/setup@master
      - name: Run Snyk Security Scan
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && steps.snyk_token_check.outputs.enabled == 'true' }}
        working-directory: promotion
        run: |
          set +e

          SNYK_API_EFFECTIVE="https://api.snyk.io"
          if [ -n "$SNYK_API_URL" ]; then
            export SNYK_API="$SNYK_API_URL"
            SNYK_API_EFFECTIVE="$SNYK_API_URL"
            echo "Using custom Snyk API endpoint from SNYK_API_URL."
          fi

          snyk auth "$SNYK_TOKEN" 2>&1 | tee snyk-auth.log
          AUTH_EXIT_CODE=${PIPESTATUS[0]}
          if [ $AUTH_EXIT_CODE -ne 0 ]; then
            echo "::error::snyk auth failed. Verify SNYK_TOKEN validity."
            exit 2
          fi

          snyk whoami --json 2>&1 | tee snyk-whoami.json
          WHOAMI_EXIT_CODE=${PIPESTATUS[0]}
          if [ $WHOAMI_EXIT_CODE -ne 0 ]; then
            echo "::error::snyk whoami failed. Verify SNYK_TOKEN permission and SNYK_API_URL region endpoint."
            exit 2
          fi

          HTTP_CODE=$(curl -sS -o snyk-me.json -w "%{http_code}" -H "Authorization: token $SNYK_TOKEN" "$SNYK_API_EFFECTIVE/v1/user/me")
          if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
            echo "::error::Snyk API access denied ($HTTP_CODE). Check token scope and org access in this tenant."
            exit 2
          fi

          ORG_ARG=()
          if [ -n "$SNYK_ORG_ID" ]; then
            ORG_ARG=("--org=$SNYK_ORG_ID")
          fi

          echo "Snyk scan working directory: $(pwd)"
          if [ ! -f "pom.xml" ]; then
            echo "::error::pom.xml is missing in promotion."
            exit 2
          fi

          snyk test \
            --file=pom.xml \
            --package-manager=maven \
            --severity-threshold=high \
            --json-file-output=snyk-results.json \
            "${ORG_ARG[@]}" \
            2>&1 | tee snyk-console.log
          SNYK_EXIT_CODE=${PIPESTATUS[0]}

          if [ $SNYK_EXIT_CODE -eq 2 ] && grep -Eq "Child process failed with exit code: -13|Failed to get dependencies|Unspecified Error \(SNYK-CLI-0000\)" snyk-console.log; then
            echo "::warning::Snyk Maven scan hit known dependency resolution/runtime issue. Falling back to SBOM scan."
            mvn -DskipTests org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeBom -DoutputName=bom -Dcyclonedx.outputFormat=json
            SBOM_EXIT_CODE=$?

            if [ $SBOM_EXIT_CODE -ne 0 ] || [ ! -s "target/bom.json" ]; then
              echo "::error::Failed to generate CycloneDX SBOM for fallback Snyk scan."
              exit 2
            fi

            snyk sbom test \
              --file=target/bom.json \
              --severity-threshold=high \
              --json-file-output=snyk-results.json \
              "${ORG_ARG[@]}" \
              2>&1 | tee -a snyk-console.log
            SNYK_EXIT_CODE=${PIPESTATUS[0]}
          fi

          if grep -Eq "403 Forbidden|401 Unauthorized|Authentication error|SNYK-0005" snyk-console.log; then
            if [ -s snyk-results.json ]; then
              echo "::warning::Snyk returned auth/permission error after producing scan results. Keeping report and continuing."
              exit 0
            fi
            echo "::error::Snyk authentication/authorization failed before scan results were produced. Verify token permissions, org access, and SNYK_API_URL."
            exit 2
          fi

          if [ $SNYK_EXIT_CODE -eq 1 ]; then
            echo "::warning::Snyk found vulnerabilities at configured severity threshold. CI continues by policy."
            exit 0
          fi

          if [ $SNYK_EXIT_CODE -eq 2 ]; then
            echo "::error::Snyk scan execution failed (non-vulnerability error). Review snyk-console.log artifact for root cause."
            exit 2
          fi

          exit $SNYK_EXIT_CODE
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API_URL: ${{ vars.SNYK_API_URL }}
          SNYK_ORG_ID: ${{ vars.SNYK_ORG_ID }}
      - name: Upload Snyk Results
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && steps.snyk_token_check.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: Snyk Security Report
          path: |
            promotion/snyk-results.json
            promotion/snyk-auth.log
            promotion/snyk-whoami.json
            promotion/snyk-me.json
            promotion/snyk-console.log
            promotion/target/bom.json
      - name: Run Trivy filesystem scanner
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: "fs"
          scan-ref: "./promotion"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          format: "sarif"
          output: "trivy-fs-results.sarif"
      - name: Upload Trivy fs scan results
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-fs-results.sarif"

  run-unit-test:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
      security-events: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - uses: ./.github/workflows/actions
      - name: Run Maven Unit Tests and Coverage
        run: |
          UPDATE_FLAG=""
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            UPDATE_FLAG="-U"
          fi
          mvn clean org.jacoco:jacoco-maven-plugin:prepare-agent test org.jacoco:jacoco-maven-plugin:report -pl promotion -am $UPDATE_FLAG
      - name: Enforce JaCoCo Coverage Threshold
        run: |
          python3 - <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          threshold = 70.0
          report_path = "promotion/target/site/jacoco/jacoco.xml"
          try:
              root = ET.parse(report_path).getroot()
          except FileNotFoundError:
              print(f"::error::Coverage report not found at {report_path}.")
              sys.exit(2)

          counter = next(
              (item for item in root.findall("counter") if item.get("type") == "LINE"),
              None,
          )

          if counter is None:
              print(f"::error::No LINE coverage counter found in {report_path}")
              sys.exit(1)

          missed = int(counter.get("missed", "0"))
          covered = int(counter.get("covered", "0"))
          total = missed + covered
          coverage = 0.0 if total == 0 else covered * 100 / total

          print(f"Line coverage: {coverage:.2f}% ({covered}/{total} lines covered)")
          if coverage < threshold:
              print(f"::error::Line coverage {coverage:.2f}% is below required {threshold:.2f}%")
              sys.exit(1)
          
          print("Coverage gate passed.")
          PY
      - name: SonarCloud Scan (Pull Request)
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && github.event_name == 'pull_request' }}
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          projectBaseDir: promotion
          args: >
            -Dsonar.projectKey=devops-teamk23_yas
            -Dsonar.organization=devops-teamk23
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.test.inclusions=src/test/java/**/*.java
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
            -Dsonar.java.binaries=target/classes
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.event.pull_request.head.ref }}
            -Dsonar.pullrequest.base=${{ github.event.pull_request.base.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: SonarCloud Scan (Branch)
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && github.event_name != 'pull_request' }}
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          projectBaseDir: promotion
          args: >
            -Dsonar.projectKey=devops-teamk23_yas
            -Dsonar.organization=devops-teamk23
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.test.inclusions=src/test/java/**/*.java
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
            -Dsonar.java.binaries=target/classes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Promotion-Service-Unit-Test-Results
          path: "promotion/**/*-reports/TEST*.xml"
          reporter: java-junit
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        with:
          paths: ${{github.workspace}}/promotion/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 60
          title: "Promotion Coverage Report"
          update-comment: true
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Jacoco Coverage Report
          path: promotion/target/site/jacoco/

  build:
    needs: run-unit-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: |
          UPDATE_FLAG=""
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            UPDATE_FLAG="-U"
          fi
          mvn package -DskipTests -pl promotion -am $UPDATE_FLAG
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./promotion
          tags: ghcr.io/nashtech-garage/yas-promotion:latest
      - name: Run Trivy image scanner
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: "ghcr.io/nashtech-garage/yas-promotion:latest"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          format: "sarif"
          output: "trivy-image-results.sarif"
      - name: Push Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./promotion
          push: true
          tags: ghcr.io/nashtech-garage/yas-promotion:latest
      - name: Upload Trivy image scan results
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-image-results.sarif"