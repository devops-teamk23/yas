name: gitops-auto-deploy

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

jobs:
  update-gitops:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repo (yas-deploy)
        uses: actions/checkout@v4
        with:
          repository: ltchcmus/yas-deploy
          token: ${{ secrets.GITOPS_PAT }}

      - name: Compute Configuration
        id: compute
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "ENV_FILE=overlays/staging/values.yaml" >> $GITHUB_OUTPUT
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "ENV_FILE=overlays/dev/values.yaml" >> $GITHUB_OUTPUT
            echo "TAG_NAME=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Update Image Tag using yq
        run: |
          ENV_FILE=${{ steps.compute.outputs.ENV_FILE }}
          TAG=${{ steps.compute.outputs.TAG_NAME }}
          
          # Update tags for basic services
          for svc in product cart order tax customer inventory media search payment recommendation webhook; do
            yq -i ".services.${svc}.tag = \"${TAG}\"" $ENV_FILE
          done
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $ENV_FILE
          git commit -m "GitOps: auto update tags to ${TAG}" || echo "No changes to commit"
          git push origin main
