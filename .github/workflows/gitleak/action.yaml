name: "Gitleaks Scan Action"

inputs:
  version:
    description: "Version of Gitleaks"
    required: true
    default: "v8.18.4"
  path:
    description: "Path to scan (relative to repo root)"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run Gitleaks Scan
      shell: bash
      run: |
        set +e
        echo "Scanning path: ${{ inputs.path }}"
        docker pull zricethezav/gitleaks:${{ inputs.version }}
        docker run --rm \
          -v ${{ github.workspace }}:/work \
          -w /work \
          zricethezav/gitleaks:${{ inputs.version }} detect \
          --source="${{ inputs.path }}" \
          --config="/work/gitleaks.toml" \
          --report-format=json \
          --report-path="/work/gitleaks-report.json" \
          --verbose \
          --no-git
        GITLEAKS_EXIT_CODE=$?

        if [ $GITLEAKS_EXIT_CODE -eq 1 ]; then
          echo "::warning::Gitleaks found potential secrets. CI continues by policy; review gitleaks-report.json artifact."
          exit 0
        fi

        if [ $GITLEAKS_EXIT_CODE -ne 0 ]; then
          echo "::error::Gitleaks execution failed with exit code $GITLEAKS_EXIT_CODE."
          exit $GITLEAKS_EXIT_CODE
        fi

        echo "Gitleaks completed successfully with no findings."
