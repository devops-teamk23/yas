name: storefront-bff service ci

on:
  push:
    branches: ["**"]
    paths:
      - "storefront-bff/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/gitleak/action.yaml"
      - ".github/workflows/storefront-bff-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["**"]
    paths:
      - "storefront-bff/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/gitleak/action.yaml"
      - ".github/workflows/storefront-bff-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
      RUN_SECURITY_SCANS: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/unit-test/storefront-bff' }}
      RUN_SONAR_SCAN: ${{ github.ref != 'refs/heads/unit-test/storefront-bff' && github.head_ref != 'unit-test/storefront-bff' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - uses: ./.github/workflows/actions
      - name: Build and Install Dependencies
        run: |
          UPDATE_FLAG=""
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            UPDATE_FLAG="-U"
          fi
          mvn clean install -DskipTests -pl storefront-bff -am $UPDATE_FLAG
      - name: Run Gitleaks Scan
        id: gitleaks_scan
        if: ${{ env.RUN_SECURITY_SCANS == 'true' }}
        continue-on-error: true
        run: |
          docker pull zricethezav/gitleaks:v8.18.4
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w /work \
            zricethezav/gitleaks:v8.18.4 detect \
            --source="storefront-bff" \
            --config="/work/gitleaks.toml" \
            --verbose \
            --no-git \
            --report-format=json \
            --report-path=storefront-bff-gitleaks-report.json
      - name: Upload Gitleaks Result
        if: ${{ always() && env.RUN_SECURITY_SCANS == 'true' }}
        uses: actions/upload-artifact@master
        with:
          name: Storefront-BFF Gitleaks Report
          path: storefront-bff-gitleaks-report.json
          if-no-files-found: warn
      - name: Run Maven Checkstyle
        if: ${{ env.RUN_SECURITY_SCANS == 'true' }}
        run: mvn checkstyle:checkstyle -pl storefront-bff -am -Dcheckstyle.output.file=storefront-bff/target/storefront-bff-checkstyle-result.xml
      - name: Upload Checkstyle Result
        if: ${{ env.RUN_SECURITY_SCANS == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: "storefront-bff/target/storefront-bff-checkstyle-result.xml"
      - name: Check Snyk Token Availability
        id: snyk_token_check
        if: ${{ env.RUN_SECURITY_SCANS == 'true' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SNYK_TOKEN is missing for this workflow context, skipping Snyk scan." | tee snyk-auth.log
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup Snyk CLI
        if: ${{ env.RUN_SECURITY_SCANS == 'true' && steps.snyk_token_check.outputs.enabled == 'true' }}
        uses: snyk/actions/setup@master
      - name: Run Snyk Security Scan
        id: snyk_scan
        if: ${{ env.RUN_SECURITY_SCANS == 'true' && steps.snyk_token_check.outputs.enabled == 'true' }}
        continue-on-error: true
        run: |
          set +e
          SNYK_API_EFFECTIVE="https://api.snyk.io"
          if [ -n "$SNYK_API_URL" ]; then
            export SNYK_API="$SNYK_API_URL"
            SNYK_API_EFFECTIVE="$SNYK_API_URL"
            echo "Using custom Snyk API endpoint from SNYK_API_URL."
          fi
          echo "Snyk CLI version:" | tee snyk-auth.log
          snyk --version 2>&1 | tee -a snyk-auth.log
          echo "Snyk API endpoint: $SNYK_API_EFFECTIVE" | tee -a snyk-auth.log
          snyk auth "$SNYK_TOKEN" 2>&1 | tee -a snyk-auth.log
          AUTH_EXIT_CODE=${PIPESTATUS[0]}
          if [ $AUTH_EXIT_CODE -ne 0 ]; then
            echo "::error::snyk auth failed. Verify SNYK_TOKEN validity."
            exit 2
          fi
          snyk whoami --json 2>&1 | tee snyk-whoami.json
          WHOAMI_EXIT_CODE=${PIPESTATUS[0]}
          cat snyk-whoami.json >> snyk-auth.log
          if [ $WHOAMI_EXIT_CODE -ne 0 ] || grep -Eq "403 Forbidden|401 Unauthorized|Authentication error|SNYK-0005" snyk-whoami.json; then
            echo "::error::snyk whoami failed. Verify SNYK_TOKEN permission and SNYK_API_URL region endpoint."
            exit 2
          fi
          HTTP_CODE=$(curl -sS -o snyk-me.json -w "%{http_code}" -H "Authorization: token $SNYK_TOKEN" "$SNYK_API_EFFECTIVE/v1/user/me")
          echo "Snyk /v1/user/me HTTP status: $HTTP_CODE" | tee -a snyk-auth.log
          cat snyk-me.json >> snyk-auth.log
          if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
            echo "::error::Snyk API access denied ($HTTP_CODE). Check token scope and org access in this tenant."
            exit 2
          fi
          snyk orgs list --json > snyk-orgs.json 2>>snyk-auth.log || true
          EFFECTIVE_ORG_ID="$SNYK_ORG_ID"
          if [ -z "$EFFECTIVE_ORG_ID" ] && [ -s snyk-orgs.json ]; then
            EFFECTIVE_ORG_ID=$(python3 -c "import json; d=json.load(open('snyk-orgs.json','r',encoding='utf-8')); print((d[0].get('id') if isinstance(d,list) and d else ''))" 2>/dev/null || true)
          fi
          ORG_ARG=()
          if [ -n "$EFFECTIVE_ORG_ID" ]; then
            ORG_ARG=("--org=$EFFECTIVE_ORG_ID")
            echo "Using Snyk org: $EFFECTIVE_ORG_ID" | tee -a snyk-auth.log
          else
            echo "::warning::No effective Snyk org found. Scan will use token default org context." | tee -a snyk-auth.log
          fi
          snyk test \
            --file=storefront-bff/pom.xml \
            --package-manager=maven \
            --severity-threshold=high \
            --json-file-output=snyk-results.json \
            "${ORG_ARG[@]}" \
            2>&1 | tee snyk-console.log
          SNYK_EXIT_CODE=${PIPESTATUS[0]}
          if [ $SNYK_EXIT_CODE -eq 2 ] && grep -Eq "Cannot build Maven dependency tree|SNYK-OS-MAVEN-0018|422 Unprocessable Entity|Child process failed with exit code: -13|Failed to get dependencies|Unspecified Error \\(SNYK-CLI-0000\\)" snyk-console.log; then
            echo "::warning::Maven dependency resolution failed inside Snyk CLI. Falling back to SBOM scan."
            mvn -f storefront-bff/pom.xml -DskipTests -Dcyclonedx.outputFormat=json org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeBom \
              2>&1 | tee -a snyk-console.log
            SBOM_EXIT_CODE=${PIPESTATUS[0]}
            if [ $SBOM_EXIT_CODE -eq 0 ] && [ -s storefront-bff/target/bom.json ]; then
              snyk sbom test \
                --file=storefront-bff/target/bom.json \
                --severity-threshold=high \
                --json-file-output=snyk-results.json \
                "${ORG_ARG[@]}" \
                2>&1 | tee -a snyk-console.log
              SNYK_EXIT_CODE=${PIPESTATUS[0]}
            else
              echo "::warning::Could not generate CycloneDX SBOM for Snyk fallback. Keeping Snyk logs as artifact."
              exit 0
            fi
          fi
          if grep -Eq "403 Forbidden|401 Unauthorized|Authentication error|SNYK-0005" snyk-console.log; then
            if [ -s snyk-results.json ]; then
              echo "::warning::Snyk returned auth/permission error after producing scan results. Keeping report and continuing."
              exit 0
            fi
            echo "::error::Snyk authentication/authorization failed before scan results were produced. Verify token permissions, org access, and SNYK_API_URL."
            exit 2
          fi
          if [ $SNYK_EXIT_CODE -eq 2 ]; then
            echo "::warning::Snyk scan execution failed with a non-vulnerability error. Review snyk-console.log artifact for root cause."
            exit 0
          fi
          if [ $SNYK_EXIT_CODE -eq 1 ]; then
            echo "::warning::Snyk found vulnerabilities at configured severity threshold. Report uploaded for remediation tracking."
            exit 0
          fi
          exit $SNYK_EXIT_CODE
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API_URL: ${{ vars.SNYK_API_URL }}
          SNYK_ORG_ID: ${{ vars.SNYK_ORG_ID }}
      - name: Upload Snyk Results
        if: ${{ always() && env.RUN_SECURITY_SCANS == 'true' }}
        uses: actions/upload-artifact@master
        with:
          name: Snyk Security Report
          path: |
            snyk-results.json
            snyk-auth.log
            snyk-whoami.json
            snyk-me.json
            snyk-orgs.json
            snyk-console.log
            storefront-bff/target/bom.json
          if-no-files-found: warn
      - name: Analyze with sonar cloud
        id: sonar_scan
        if: ${{ env.RUN_SECURITY_SCANS == 'true' && env.RUN_SONAR_SCAN == 'true' }}
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::warning::SONAR_TOKEN is missing for this workflow context, skipping SonarCloud analysis."
            exit 0
          fi
          SONAR_CMD="org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_KEY="${{ github.event.pull_request.number }}"
            PR_BRANCH="${{ github.event.pull_request.head.ref }}"
            PR_BASE="${{ github.event.pull_request.base.ref }}"
            mvn "$SONAR_CMD" -f storefront-bff \
              -Dsonar.pullrequest.key="$PR_KEY" \
              -Dsonar.pullrequest.branch="$PR_BRANCH" \
              -Dsonar.pullrequest.base="$PR_BASE" \
              2>&1 | tee sonar.log
            SONAR_EXIT_CODE=$?
            if [ $SONAR_EXIT_CODE -ne 0 ]; then
              if grep -Eqi "Could not find the pullrequest with key|pullrequest with key|Error 404 on https://api\\.sonarcloud\\.io/analysis/analyses|Detected project binding: BOUND" sonar.log; then
                echo "::warning::SonarCloud ALM binding/platform issue for this PR. Skipping Sonar failure to avoid blocking CI."
                exit 0
              fi
            fi
            exit $SONAR_EXIT_CODE
          fi
          mvn "$SONAR_CMD" -f storefront-bff -Dsonar.branch.name="${{ github.ref_name }}" \
            2>&1 | tee sonar.log
          SONAR_EXIT_CODE=$?
          if [ $SONAR_EXIT_CODE -ne 0 ] && grep -Eq "Error 404 on https://api\\.sonarcloud\\.io/analysis/analyses" sonar.log; then
            echo "::warning::SonarCloud analysis API returned 404. Skipping Sonar failure for platform-side issue."
            exit 0
          fi
          exit $SONAR_EXIT_CODE
      - name: Cache OWASP Dependency-Check Database
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-dc-${{ hashFiles('storefront-bff/pom.xml') }}
          restore-keys: owasp-dc-
      - name: OWASP Dependency Check
        id: owasp_scan
        if: ${{ env.RUN_SECURITY_SCANS == 'true' }}
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: "yas"
          path: "."
          format: "HTML"
      - name: Upload OWASP Dependency Check results
        if: ${{ always() && env.RUN_SECURITY_SCANS == 'true' }}
        uses: actions/upload-artifact@master
        with:
          name: OWASP Dependency Check Report
          path: ${{github.workspace}}/reports
          if-no-files-found: warn
      - name: Fail on security scan errors
        if: ${{ always() && env.RUN_SECURITY_SCANS == 'true' && steps.gitleaks_scan.outcome == 'failure' }}
        run: exit 1

  run-unit-test:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/unit-test/storefront-bff' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - uses: ./.github/workflows/actions
      - name: Run Maven Unit Tests and Coverage
        run: |
          UPDATE_FLAG=""
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            UPDATE_FLAG="-U"
          fi
          mvn clean org.jacoco:jacoco-maven-plugin:prepare-agent test org.jacoco:jacoco-maven-plugin:report -pl storefront-bff -am $UPDATE_FLAG

      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Storefront-BFF-Unit-Test-Results
          path: "storefront-bff/**/*-reports/TEST*.xml"
          reporter: java-junit
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        with:
          paths: ${{github.workspace}}/storefront-bff/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 60
          title: "Storefront BFF Coverage Report"
          update-comment: true
      - name: Upload Coverage Report
        if: success()
        uses: actions/upload-artifact@master
        with:
          name: Jacoco Coverage Report
          path: storefront-bff/target/site/jacoco/

  build:
    needs: run-unit-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: |
          UPDATE_FLAG=""
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            UPDATE_FLAG="-U"
          fi
          mvn package -DskipTests -pl storefront-bff -am $UPDATE_FLAG
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./storefront-bff
          push: true
          tags: ghcr.io/nashtech-garage/yas-storefront-bff:latest
