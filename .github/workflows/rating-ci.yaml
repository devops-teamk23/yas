name: rating service ci

on:
  push:
    branches: ["**"]
    paths:
      - "rating/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/gitleak/action.yaml"
      - ".github/workflows/rating-ci.yaml"
  pull_request:
    branches: ["**"]
    paths:
      - "rating/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/gitleak/action.yaml"
      - ".github/workflows/rating-ci.yaml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      RUN_SECURITY_SCANS: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/unit-test/rating' }}
      RUN_SONAR_SCAN: ${{ github.ref != 'refs/heads/unit-test/rating' && github.head_ref != 'unit-test/rating' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - uses: ./.github/workflows/actions
      - name: Build and Install Dependencies
        run: |
          UPDATE_FLAG=""
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            UPDATE_FLAG="-U"
          fi
          mvn clean install -DskipTests -pl rating -am $UPDATE_FLAG
      - name: Run Gitleaks Scan
        id: gitleaks_scan
        if: ${{ env.RUN_SECURITY_SCANS == 'true' }}
        #continue-on-error: true
        run: |
          docker pull zricethezav/gitleaks:v8.18.4
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w /work \
            zricethezav/gitleaks:v8.18.4 detect \
            --source="rating" \
            --config="/work/gitleaks.toml" \
            --verbose \
            --no-git \
            --report-format=json \
            --report-path=rating-gitleaks-report.json
      - name: Upload Gitleaks Result
        if: ${{ always() && env.RUN_SECURITY_SCANS == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: Rating Gitleaks Report
          path: rating-gitleaks-report.json
          if-no-files-found: warn
      - name: Run Maven Checkstyle
        if: ${{ env.RUN_SECURITY_SCANS == 'true' }}
        run: mvn checkstyle:checkstyle -pl rating -am -Dcheckstyle.output.file=rating/target/rating-checkstyle-result.xml
      - name: Upload Checkstyle Result
        if: ${{ env.RUN_SECURITY_SCANS == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: "rating/target/rating-checkstyle-result.xml"
      - name: Check Snyk Token Availability
        id: snyk_token_check
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SNYK_TOKEN is missing for this workflow context, skipping Snyk scan."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup Snyk CLI
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && steps.snyk_token_check.outputs.enabled == 'true' }}
        uses: snyk/actions/setup@master
      - name: Run Snyk Security Scan
        id: snyk_scan
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && steps.snyk_token_check.outputs.enabled == 'true' }}
        #continue-on-error: true
        working-directory: rating
        run: |
          set +e

          SNYK_API_EFFECTIVE="https://api.snyk.io"
          if [ -n "$SNYK_API_URL" ]; then
            export SNYK_API="$SNYK_API_URL"
            SNYK_API_EFFECTIVE="$SNYK_API_URL"
            echo "Using custom Snyk API endpoint from SNYK_API_URL."
          fi

          snyk auth "$SNYK_TOKEN" 2>&1 | tee snyk-auth.log
          AUTH_EXIT_CODE=${PIPESTATUS[0]}
          if [ $AUTH_EXIT_CODE -ne 0 ]; then
            echo "::error::snyk auth failed. Verify SNYK_TOKEN validity."
            exit 2
          fi

          snyk whoami --json 2>&1 | tee snyk-whoami.json
          WHOAMI_EXIT_CODE=${PIPESTATUS[0]}
          if [ $WHOAMI_EXIT_CODE -ne 0 ]; then
            echo "::error::snyk whoami failed. Verify SNYK_TOKEN permission and SNYK_API_URL region endpoint."
            exit 2
          fi

          HTTP_CODE=$(curl -sS -o snyk-me.json -w "%{http_code}" -H "Authorization: token $SNYK_TOKEN" "$SNYK_API_EFFECTIVE/v1/user/me")
          if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
            echo "::error::Snyk API access denied ($HTTP_CODE). Check token scope and org access in this tenant."
            exit 2
          fi

          ORG_ARG=()
          if [ -n "$SNYK_ORG_ID" ]; then
            ORG_ARG=("--org=$SNYK_ORG_ID")
          fi

          echo "Snyk scan working directory: $(pwd)"
          if [ ! -f "pom.xml" ]; then
            echo "::error::pom.xml is missing in rating."
            exit 2
          fi

          snyk test \
            --file=pom.xml \
            --package-manager=maven \
            --severity-threshold=high \
            --json-file-output=snyk-results.json \
            "${ORG_ARG[@]}" \
            2>&1 | tee snyk-console.log
          SNYK_EXIT_CODE=${PIPESTATUS[0]}

          if [ $SNYK_EXIT_CODE -eq 2 ] && grep -Eq "Child process failed with exit code: -13|Failed to get dependencies|Unspecified Error \(SNYK-CLI-0000\)|Cannot build Maven dependency tree|SNYK-OS-MAVEN-0018|422 Unprocessable Entity" snyk-console.log; then
            echo "::warning::Snyk Maven scan hit known dependency resolution/runtime issue. Falling back to SBOM scan."
            mvn -f ../pom.xml -DskipTests org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeBom -pl rating -am -DoutputName=bom -Dcyclonedx.outputFormat=json
            SBOM_EXIT_CODE=$?

            if [ $SBOM_EXIT_CODE -ne 0 ] || [ ! -s "target/bom.json" ]; then
              echo "::error::Failed to generate CycloneDX SBOM for fallback Snyk scan."
              exit 2
            fi

            snyk sbom test \
              --file=target/bom.json \
              --severity-threshold=high \
              --json-file-output=snyk-results.json \
              "${ORG_ARG[@]}" \
              2>&1 | tee -a snyk-console.log
            SNYK_EXIT_CODE=${PIPESTATUS[0]}
          fi

          if grep -Eq "403 Forbidden|401 Unauthorized|Authentication error|SNYK-0005" snyk-console.log; then
            if [ -s snyk-results.json ]; then
              echo "::warning::Snyk returned auth/permission error after producing scan results. Keeping report and continuing."
              exit 0
            fi
            echo "::error::Snyk authentication/authorization failed before scan results were produced. Verify token permissions, org access, and SNYK_API_URL."
            exit 2
          fi

          if [ $SNYK_EXIT_CODE -eq 1 ]; then
            echo "::warning::Snyk found vulnerabilities at configured severity threshold. CI continues by policy."
            exit 0
          fi

          if [ $SNYK_EXIT_CODE -eq 2 ]; then
            echo "::warning::Snyk scan execution failed (non-vulnerability error). Review snyk-console.log artifact for root cause."
            exit 0
          fi

          exit $SNYK_EXIT_CODE
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API_URL: ${{ vars.SNYK_API_URL }}
          SNYK_ORG_ID: ${{ vars.SNYK_ORG_ID }}
      - name: Upload Snyk Results
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && steps.snyk_token_check.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: Snyk Security Report
          path: |
            rating/snyk-results.json
            rating/snyk-auth.log
            rating/snyk-whoami.json
            rating/snyk-me.json
            rating/snyk-console.log
            rating/target/bom.json
      - name: Analyze with SonarCloud
        if: ${{ env.RUN_SECURITY_SCANS == 'true' && env.RUN_SONAR_SCAN == 'true' }}
        #continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e

          if [ -z "$SONAR_TOKEN" ]; then
            echo "::warning::SONAR_TOKEN is not set. Skipping SonarCloud analysis."
            exit 0
          fi

          SONAR_CMD="org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_KEY="${{ github.event.pull_request.number }}"
            PR_BRANCH="${{ github.event.pull_request.head.ref }}"
            PR_BASE="${{ github.event.pull_request.base.ref }}"

            mvn "$SONAR_CMD" -f rating \
              -Dsonar.pullrequest.key="$PR_KEY" \
              -Dsonar.pullrequest.branch="$PR_BRANCH" \
              -Dsonar.pullrequest.base="$PR_BASE" \
              2>&1 | tee sonar.log
            SONAR_EXIT_CODE=$?

            if [ $SONAR_EXIT_CODE -ne 0 ]; then
              if grep -Eqi "Could not find the pullrequest with key|Error 404 on https://api\.sonarcloud\.io/analysis/analyses|Detected project binding: BOUND" sonar.log; then
                echo "::warning::SonarCloud ALM binding/platform issue for this PR. Skipping Sonar failure to avoid blocking CI."
                exit 0
              fi
            fi

            exit $SONAR_EXIT_CODE
          fi

          mvn "$SONAR_CMD" -f rating -Dsonar.branch.name="${{ github.ref_name }}" \
            2>&1 | tee sonar.log
          SONAR_EXIT_CODE=$?

          if [ $SONAR_EXIT_CODE -ne 0 ] && grep -Eqi "Error 404 on https://api\.sonarcloud\.io/analysis/analyses" sonar.log; then
            echo "::warning::SonarCloud analysis API returned 404. Skipping Sonar failure for platform-side issue."
            exit 0
          fi

          exit $SONAR_EXIT_CODE
      - name: Run Trivy filesystem scanner
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: "fs"
          scan-ref: "./rating"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          format: "sarif"
          output: "trivy-fs-results.sarif"
      - name: Upload Trivy fs scan results
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-fs-results.sarif"
      - name: Fail on security scan errors
        if: ${{ always() && env.RUN_SECURITY_SCANS == 'true' && steps.gitleaks_scan.outcome == 'failure' }}
        run: exit 1

  run-unit-test:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
      security-events: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - uses: ./.github/workflows/actions
      - name: Run Maven Unit Tests and Coverage
        run: |
          UPDATE_FLAG=""
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            UPDATE_FLAG="-U"
          fi
          mvn clean org.jacoco:jacoco-maven-plugin:prepare-agent test org.jacoco:jacoco-maven-plugin:report -pl rating -am $UPDATE_FLAG
      - name: Enforce JaCoCo Coverage Threshold
        run: |
          python3 - <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          threshold = 70.0
          report_path = "rating/target/site/jacoco/jacoco.xml"
          root = ET.parse(report_path).getroot()
          counter = next(
              (item for item in root.findall("counter") if item.get("type") == "LINE"),
              None,
          )

          if counter is None:
              print(f"::error::No LINE coverage counter found in {report_path}")
              sys.exit(1)

          missed = int(counter.get("missed", "0"))
          covered = int(counter.get("covered", "0"))
          total = missed + covered
          coverage = 0.0 if total == 0 else covered * 100 / total

          print(f"Line coverage: {coverage:.2f}% ({covered}/{total} lines covered)")
          if coverage < threshold:
              print(f"::error::Line coverage {coverage:.2f}% is below required {threshold:.2f}%")
              sys.exit(1)
          PY
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Rating-Service-Unit-Test-Results
          path: "rating/**/*-reports/TEST*.xml"
          reporter: java-junit
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        with:
          paths: ${{github.workspace}}/rating/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 60
          title: "Rating Coverage Report"
          update-comment: true
      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Jacoco Coverage Report
          path: rating/target/site/jacoco/

  build:
    needs: run-unit-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: |
          UPDATE_FLAG=""
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            UPDATE_FLAG="-U"
          fi
          mvn package -DskipTests -pl rating -am $UPDATE_FLAG
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./rating
          tags: ghcr.io/nashtech-garage/yas-rating:latest
      - name: Run Trivy image scanner
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: "ghcr.io/nashtech-garage/yas-rating:latest"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          format: "sarif"
          output: "trivy-image-results.sarif"
      - name: Push Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./rating
          push: true
          tags: ghcr.io/nashtech-garage/yas-rating:latest
      - name: Upload Trivy image scan results
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-image-results.sarif"