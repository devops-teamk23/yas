name: developer_destroy

on:
  workflow_dispatch:
    inputs:
      sandbox_id:
        description: "Sandbox environment name to destroy (e.g. test01)"
        required: true

jobs:
  destroy-sandbox:
    runs-on: ubuntu-latest
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd

      - name: Destroy Sandbox via ArgoCD API
        run: |
          # Login to ArgoCD
          argocd login argocd.yas.lethanhcong.site --username admin --password ${{ secrets.ARGOCD_PASSWORD }} --grpc-web
          
          # Delete App (Cascade)
          argocd app delete dev-${{ github.event.inputs.sandbox_id }} --cascade --yes
